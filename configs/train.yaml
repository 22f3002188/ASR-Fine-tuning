model:
  name: openai/whisper-small   # change to medium / large-v3 as needed
  language: null               # e.g. "hindi", "kannada"
  task: transcribe

training:
  output_dir: checkpoints/
  num_train_epochs: 10
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 1e-5
  warmup_steps: 500
  eval_strategy: epoch
  save_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: wer
  fp16: true
  generation_max_length: 225
  logging_steps: 25
  report_to: wandb
