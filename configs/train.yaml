model:
  name: openai/whisper-large-v3
  language: punjabi
  task: transcribe

training:
  output_dir: checkpoints/

  # IndicVoices is massive — estimate max_steps from your subset size.
  # e.g. 200k samples / (64 batch * 1 accum) = ~3125 steps/epoch * 10 = 31250
  max_steps: 30000
  warmup_steps: 1000

  # Reduce per-device batch to avoid OOM on large-v3.
  # Effective batch = 16 * 4 = 64 — same as before.
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4

  # Vanilla FT: 5e-6 (safe for full model updates in bf16)
  # BAFT mode : 3e-4 (recommended by Liu et al. 2024 — adapters train faster)
  # Switch learning_rate when toggling baft.enabled in lora.yaml
  learning_rate: 5.0e-6
  lr_scheduler_type: linear
  weight_decay: 0.01

  eval_strategy: steps
  eval_steps: 2000
  save_strategy: steps
  save_steps: 2000
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: wer
  greater_is_better: false

  bf16: true
  fp16: false
  # Gradient checkpointing disabled — incompatible with this version of
  # transformers/accelerate due to double-backward in the recomputation pass.
  # To save VRAM instead: reduce per_device_train_batch_size to 4-8.
  gradient_checkpointing: false
  # num_workers=0 is safest for streaming datasets on machines with limited /dev/shm.
  # Increase to 4-8 on machines with large shared memory (check: df -h /dev/shm).
  dataloader_num_workers: 0
  dataloader_pin_memory: false

  predict_with_generate: true
  generation_max_length: 448    # Whisper decoder hard limit — do not exceed

  logging_steps: 50
  report_to: tensorboard           # tensorboard as requested
  smoke_test_steps: 10