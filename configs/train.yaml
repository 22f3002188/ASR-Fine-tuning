model:
  name: openai/whisper-large-v3
  language: punjabi
  task: transcribe

training:
  output_dir: checkpoints
  max_steps: 30000
  smoke_test_steps: 10

  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 2

  learning_rate: 5e-6
  warmup_steps: 1000

  logging_steps: 10
  eval_steps: 2000
  save_steps: 2000

  eval_strategy: steps
  save_strategy: steps

  generation_max_length: 448

  bf16: true
  fp16: false