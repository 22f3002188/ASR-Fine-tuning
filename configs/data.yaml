data:
  dataset_name: ai4bharat/IndicVoices
  language: punjabi
  split_train: train
  split_val: valid
  audio_column: audio_filepath   
  text_column: normalized
  sampling_rate: 16000
  max_duration_secs: 30.0
  min_duration_secs: 0.1
  buffer_size: 5000
  seed: 42
  augmentation:
    enabled: true
    spec_augment: true
    noise_prob: 0.3
    speed_prob: 0.3
    speed_range: [0.9, 1.1]
  normalization: basic