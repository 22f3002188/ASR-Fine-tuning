# LoRA is currently disabled — vanilla full finetuning is used instead.
# Re-enable by setting enabled: true and wiring apply_lora() back into train.py.
lora:
  enabled: false
  r: 32
  lora_alpha: 64
  target_modules:
    - q_proj
    - v_proj
  lora_dropout: 0.05
  bias: none
  apply_to: decoder_only

freeze:
  encoder: false
  freeze_decoder_layers: 0
  freeze_embed_positions: false