lora:
  enabled: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  bias: "none"

  # base module names to search for inside Whisper
  target_modules:
    - q_proj
    - v_proj

  # options: decoder_only, encoder_only, both
  apply_to: decoder_only

freeze:
  encoder: true
  embed_positions: false
  decoder_layers: 0