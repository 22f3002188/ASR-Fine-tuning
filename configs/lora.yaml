# ── LoRA (currently disabled) ─────────────────────────────────────────────────
lora:
  enabled: false
  r: 32
  lora_alpha: 64
  target_modules:
    - q_proj
    - v_proj
  lora_dropout: 0.05
  bias: none
  apply_to: decoder_only

freeze:
  encoder: false
  freeze_decoder_layers: 0
  freeze_embed_positions: false

# ── Bottleneck Adapter / BAFT ─────────────────────────────────────────────────
# Set enabled: true to switch from vanilla finetuning to BAFT.
# Only BA parameters (~0.8% of model) are trained — all Whisper weights frozen.
# Recommended LR: 3e-4 (10x higher than vanilla FT, per Liu et al. 2024)
baft:
  enabled: true
  d: 64           # bottleneck dimension — 64 is optimal per paper
  dropout: 0.0    # dropout inside the adapter (0 = off, 0.1 for regularisation)